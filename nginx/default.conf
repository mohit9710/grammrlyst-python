# ================= HTTP =================
server {
    listen 80;
    server_name grammrlyst.in www.grammrlyst.in;

    location = / {
        return 302 /docs;
    }

    location / {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ================= HTTPS =================
server {
    listen 443 ssl;
    server_name grammrlyst.in www.grammrlyst.in;

    ssl_certificate /etc/letsencrypt/live/grammrlyst.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grammrlyst.in/privkey.pem;

    location / {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}