name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull your code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx (for better builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build Docker image
      - name: Build Docker Image
        run: docker build -t my-python-app:latest .

      # Step 5: Tag Docker image with your Docker Hub username
      - name: Tag Docker Image
        run: docker tag my-python-app:latest thisact/my-python-app:latest

      # Step 6: Push Docker image to Docker Hub
      - name: Push Docker Image
        run: docker push evil9710/my-python-app:latest
