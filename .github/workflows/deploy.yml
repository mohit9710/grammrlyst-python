name: FastAPI CD on EC2

on:
  push:
    branches:
      - main  # Jab aap main branch pe push karenge, deploy shuru ho jayega

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/grammrlyst-python
            
            # Pehle ensure karein ki hum main branch par hain
            git checkout main || git checkout -b main
            
            # Sab kuch fetch aur reset karein
            git fetch --all
            git reset --hard origin/main
            
            # Dependencies install karein
            ./venv/bin/pip install -r requirement.txt
            
            # Restart Services
            sudo systemctl daemon-reload
            sudo systemctl restart fastapi
            sudo systemctl restart nginx
            
            # Verification
            sleep 2
            sudo systemctl status fastapi --no-pager
            echo "Deployment Successful on Main Branch!"