name: FastAPI CD on EC2

on:
  push:
    branches:
      - main  # Jab aap main branch pe push karenge, deploy shuru ho jayega

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/grammrlyst-python
            
            # 1. Branch sync karna
            git fetch --all
            git checkout -B main origin/main
            git reset --hard origin/main
            
            # 2. Dependencies install karna (Conditional Check)
            if [ -f "requirements.txt" ]; then
                ./venv/bin/pip install -r requirements.txt
            elif [ -f "requirement.txt" ]; then
                ./venv/bin/pip install -r requirement.txt
            fi
            
            # 3. Purani stuck processes kill karna aur restart
            sudo fuser -k 8000/tcp || true
            sudo systemctl daemon-reload
            sudo systemctl restart fastapi
            sudo systemctl restart nginx
            
            # 4. Verification
            echo "Waiting for service to stabilize..."
            sleep 3
            sudo systemctl status fastapi --no-pager
            echo "Deployment Successful on Main Branch!"